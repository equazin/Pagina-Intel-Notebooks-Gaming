<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- SM · óleo impasto — monograma de Sophia Maseda -->
  <defs>
    <pattern id="canvas" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#eee3cd"/>
      <path d="M0 0 L 4 4 M 0 4 L 4 0" stroke="#c9b98d" stroke-width=".28" opacity=".55"/>
    </pattern>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"  stop-color="#3a0d68"/>
      <stop offset=".55" stop-color="#b14bff"/>
      <stop offset="1"  stop-color="#ff5fa2"/>
    </linearGradient>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5fa2"/>
      <stop offset="1" stop-color="#5c1893"/>
    </linearGradient>
    <linearGradient id="c" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#8523d0"/>
      <stop offset="1" stop-color="#ff8dc0"/>
    </linearGradient>
    <filter id="brush" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency=".55" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
  </defs>
  <rect width="100" height="100" fill="url(#canvas)"/>
  <!-- S en tres pinceladas empastadas -->
  <g filter="url(#brush)">
    <path d="M26 32 C 48 22, 68 28, 62 40" stroke="url(#a)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M56 42 C 34 46, 40 60, 60 58" stroke="url(#b)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M52 60 C 72 62, 72 80, 40 76" stroke="url(#c)" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>
  <!-- crestas iluminadas del impasto -->
  <path d="M30 30 Q 46 24 58 30" stroke="#ffd6ea" stroke-width="1.6" fill="none" stroke-linecap="round" opacity=".8"/>
  <path d="M56 44 Q 42 50 46 56" stroke="#ffd6ea" stroke-width="1.3" fill="none" stroke-linecap="round" opacity=".65"/>
  <path d="M56 62 Q 66 68 60 76" stroke="#ffd6ea" stroke-width="1.4" fill="none" stroke-linecap="round" opacity=".7"/>
  <!-- M firma -->
  <g filter="url(#brush)">
    <path d="M62 82 L 66 66 L 72 78 L 78 66 L 82 82" stroke="#3a0d68" stroke-width="4.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- gota de óleo -->
  <circle cx="86" cy="24" r="2.2" fill="#ff5fa2" opacity=".85"/>
  <circle cx="89" cy="21" r="1.1" fill="#b14bff" opacity=".7"/>
</svg>
